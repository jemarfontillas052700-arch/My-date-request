<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Request ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="page1" class="card">
<h1>🌸 Will you go on a date with me, Lian Tracy Sadsad? 🌸</h1>

<button id="yesBtn">YES ❤️</button>
</div>

<div id="page2" class="card hidden">

<h1>When are you free? 📅</h1>

<input type="date" id="date">

<h3>Choose a time</h3>

<select id="time">
<option>12:00 PM</option>
<option>1:00 PM</option>
<option>2:00 PM</option>
<option>5:00 PM</option>
<option>6:00 PM</option>
<option>7:00 PM</option>
<option>8:00 PM</option>
</select>

<h3>Food?</h3>

<select id="food">
<option>🍜 Ramen</option>
<option>🍝 Pasta</option>
<option>🍣 Sushi</option>
<option>🍕 Pizza</option>
</select>

<button id="confirmBtn">Set the Date ❤️</button>

</div>

<div id="page3" class="card hidden">

<h1>YAY!! 💕</h1>

<h2 id="summary"></h2>

<p>I can't wait to see you! 🌹</p>

</div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
